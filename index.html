let activeEl = null;

function build(){
  const feed = document.getElementById('feed');
  let lastGrp = null;
  posts.forEach((p,i)=>{
    if(p.grp && p.grp !== lastGrp){
      lastGrp = p.grp;
      const sep = document.createElement('div');
      sep.className = 'week-sep';
      sep.innerHTML = `${p.grp}<span class="week-theme">— ${p.theme}</span>`;
      feed.appendChild(sep);
    }
    const isstar = p.star;
    const catMap = {
      edu:{label:'Educativo',cls:'tag-edu',dot:'dot-edu',icon:'ti-books'},
      bastidor:{label:'Bastidor / prova',cls:'tag-bastidor',dot:'dot-bastidor',icon:'ti-video'},
      auto:{label:'Autoridade',cls:'tag-auto',dot:'dot-auto',icon:'ti-award'},
      conv:{label:'Conversão',cls:'tag-conv',dot:'dot-conv',icon:'ti-arrow-right'},
      star:{label:'Carcaça destaque',cls:'tag-star',dot:'dot-star',icon:'ti-star'}
    };
    const cm = catMap[p.cat];
    const tipoIcon = p.tipo==='Reels'?'ti-video':p.tipo==='Carrossel'?'ti-layout-grid':'ti-photo';

    const row = document.createElement('div');
    row.className = 'day-row';
    const dot = document.createElement('div');
    dot.className = `day-dot ${cm.dot}`;
    row.appendChild(dot);

    const card = document.createElement('div');
    card.className = `day-card${isstar?' star-card':''}`;
    card.innerHTML = `
      <div class="dc-left">
        <div class="dc-day">${p.day}</div>
        <div class="dc-date" style="${isstar?'color:#993556':''}">${p.date.split(' ')[0]}</div>
        <div style="font-size:9px;color:var(--color-text-tertiary)">${p.date.split(' ')[1]}</div>
      </div>
      <div class="dc-right">
        <span class="dc-tag ${cm.cls}"><i class="ti ${tipoIcon}" style="font-size:10px" aria-hidden="true"></i>${p.tipo} · ${cm.label}</span>${isstar?'<span class="star-badge"><i class="ti ti-star" style="font-size:10px" aria-hidden="true"></i>Serviço destaque</span>':''}
        <div class="dc-title">${p.title}</div>
        <div class="dc-hook">${p.hook}</div>
        <div class="dc-conn">
          <span style="font-size:10px;color:var(--color-text-tertiary)">Conecta com:</span>
          <span class="conn-pill">${p.prox}</span>
        </div>
      </div>`;
    card.onclick = ()=>toggle(card,p,i);
    row.appendChild(card);
    feed.appendChild(row);

    const det = document.createElement('div');
    det.className = 'detail-box';
    det.id = `d${i}`;
    det.innerHTML = `
      <button class="db-close" onclick="event.stopPropagation();closeD(${i})"><i class="ti ti-x" style="font-size:11px" aria-hidden="true"></i></button>
      <div class="dl">Objetivo</div><div class="dv">${p.obj}</div>
      <div class="dl">Conexão no fluxo</div><div class="dv">${p.conecta}</div>
      <div class="dl">Roteiro / texto sugerido</div><div class="dv-script">${p.script}</div>
      <div class="dl">Legenda</div><div class="dv" style="font-style:italic">${p.legenda}</div>`;
    feed.appendChild(det);
  });
}

function toggle(card,p,i){
  const det = document.getElementById(`d${i}`);
  const open = det.classList.contains('show');
  if(activeEl && activeEl!==det){
    activeEl.classList.remove('show');
    activeEl.previousElementSibling?.querySelector('.day-card')?.classList.remove('active');
  }
  if(open){det.classList.remove('show');card.classList.remove('active');activeEl=null;}
  else{det.classList.add('show');card.classList.add('active');activeEl=det;setTimeout(()=>det.scrollIntoView({behavior:'smooth',block:'nearest'}),50);}
}
function closeD(i){
  const det=document.getElementById(`d${i}`);
  det.classList.remove('show');
  det.previousElementSibling?.querySelector('.day-card')?.classList.remove('active');
  activeEl=null;
}
build();
</script>
